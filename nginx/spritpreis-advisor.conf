# Als eigenen server-Block ODER als location innerhalb eines bestehenden
# server-Blocks in die vorhandene Nginx-Konfiguration auf dem Pi einbinden.
# Passe server_name / Port nach Bedarf an.

server {
    listen 8090;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Matomo unter demselben Origin erreichbar machen, damit der Browser das
    # Tracking nicht als "Zugriff auf privates Netzwerk" blockiert (Firefox
    # Local Network Access / Chrome Private Network Access). Der Trailing-Slash
    # bei proxy_pass ist wichtig - er sorgt dafür, dass "/matomo/" aus dem Pfad
    # entfernt wird, bevor die Anfrage an Matomo weitergereicht wird.
    location /matomo/ {
        proxy_pass http://127.0.0.1:8110/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
